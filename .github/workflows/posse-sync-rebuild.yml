---
name: POSSE Sync - Rebuild After Syndication

on:
  # Trigger when ephemera files are modified on main
  push:
    branches: [main]
    paths:
      - "src/content/ephemera/**"

  # Trigger after the prebuild syndication workflow completes
  workflow_run:
    workflows: ["POSSE - Pre-Build Syndication"]
    types:
      - completed

  # Manual trigger for debugging
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual trigger reason"
        required: false
        default: "Manual sync check"

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest

    # Only run if this is a POSSE-related commit or triggered by workflow
    if: |
      contains(github.event.head_commit.message, '🤖 POSSE:') ||
      contains(github.event.head_commit.message, 'Update syndication') ||
      github.event_name == 'workflow_run' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if rebuild is actually needed
        id: check
        run: |
          echo "🔍 Checking if syndication links need to be reflected on site..."

          # Get the last commit that modified ephemera
          changed_files=$(git diff --name-only HEAD~1 HEAD -- "src/content/ephemera/" || true)

          needs_rebuild=false

          for file in $changed_files; do
            if [[ "$file" =~ \.md$ ]]; then
              echo "Checking: $file"
              
              # Check if this file has syndication in the markdown
              if grep -q "syndication:" "$file"; then
                echo "  ✓ Has syndication links"
                needs_rebuild=true
              else
                echo "  ℹ️ No syndication yet"
              fi
            fi
          done

          if [ "$needs_rebuild" = true ]; then
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            echo "📝 Ephemera with syndication detected - rebuild needed"
          else
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
            echo "✅ No rebuild needed"
          fi

      - name: Trigger CloudCannon rebuild
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          echo "🚀 Triggering site rebuild..."

          # Configure git for commit
          git config user.name "POSSE Sync Bot"
          git config user.email "posse-sync@ryanparsley.com"

          # Create a sync marker file with timestamp
          echo "Rebuild after syndication: $(date -u)" > .last-posse-sync
          git add .last-posse-sync

          # Commit with [skip ci] to avoid triggering this workflow again
          git commit -m "🤖 POSSE: Trigger rebuild after syndication sync [skip ci]"

          # Push to trigger CloudCannon build
          git push origin main

          echo "✅ Rebuild triggered - CloudCannon should deploy with syndication links"

      - name: Summary
        run: |
          echo "=== POSSE Sync Summary ==="
          echo "Trigger: ${{ github.event_name }}"
          echo "Commit: ${{ github.event.head_commit.message }}"
          echo "Rebuild needed: ${{ steps.check.outputs.needs_rebuild }}"
          echo "Time: $(date -u)"
