# Posty content auto-merge workflow
# Creates PR from content branches and auto-merges them

name: Posty Content Merge

on:
  push:
    branches:
      - "ephemera/*"
      - "blog/*"
      - "note/*"
      - "link/*"

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract branch info
        id: info
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          CONTENT_TYPE=$(echo "$BRANCH_NAME" | cut -d'/' -f1)
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "content_type=$CONTENT_TYPE" >> $GITHUB_OUTPUT
          echo "type=$CONTENT_TYPE branch=$BRANCH_NAME"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.info.outputs.branch }}"
          TYPE="${{ steps.info.outputs.content_type }}"

          # Check if PR already exists
          PR_COUNT=$(gh pr list --head "$BRANCH" --base main --state open --json id -q 'length')

          if [ "$PR_COUNT" = "0" ]; then
            echo "Creating PR for $BRANCH..."
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Add $TYPE content" \
              --body "Auto-generated from Posty"
          else
            echo "PR already exists for $BRANCH"
          fi

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.info.outputs.branch }}"

          # Wait for PR to be ready
          sleep 5

          # Enable auto-merge
          gh pr merge "$BRANCH" --auto --merge || echo "Auto-merge may already be enabled"

          echo "Done - PR should merge once build passes"
