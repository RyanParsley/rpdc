---
name: POSSE - Pre-Build Syndication

# This workflow runs when content branches are pushed (before merge to main)
# It syndicates to Mastodon/Bluesky and updates the files WITH syndication links
# so when the PR merges, main already has the syndication data

on:
  push:
    branches:
      - "ephemera/*"
      - "blog/*"
      - "note/*"
      - "link/*"
  workflow_dispatch:

# This runs on the CONTENT BRANCH, not main
# So the syndication links are added before the merge

jobs:
  syndicate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run POSSE syndication
        id: posse
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          BLUESKY_USERNAME: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: |
          echo "🚀 Running POSSE syndication on content branch..."

          # Run build which triggers POSSE integration
          # This posts to platforms and updates local files
          npm run build 2>&1 | tee build.log

          # Check if syndication happened
          if grep -q "POSSE: Updated" build.log 2>/dev/null; then
            echo "syndication_happened=true" >> $GITHUB_OUTPUT
            echo "📝 Syndication completed:"
            grep "POSSE: Updated" build.log | tail -5
          else
            echo "syndication_happened=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No syndication needed or already done"
          fi

      - name: Check for file updates
        id: check
        run: |
          # Check if any ephemera files were modified
          if git diff --name-only | grep -q "src/content/"; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "📝 Content files updated with syndication:"
            git diff --name-only | grep "src/content/"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit syndication to content branch
        if: steps.check.outputs.has_updates == 'true'
        run: |
          BRANCH_NAME="${{ github.ref_name }}"

          git config user.name "POSSE Bot"
          git config user.email "posse@ryanparsley.com"

          # Stage content files
          git add src/content/

          # Check if there's anything to commit
          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi

          git commit -m "🤖 POSSE: Add syndication links

          Auto-added Mastodon/Bluesky syndication URLs.
          These links will be included when this branch merges to main."

          echo "🔄 Pushing to $BRANCH_NAME..."
          git push origin "$BRANCH_NAME"

          echo "✅ Syndication links committed to content branch"
          echo "   The PR will now include syndication data"

      - name: Summary
        run: |
          echo "=== POSSE Pre-Build Summary ==="
          echo "Branch: ${{ github.ref_name }}"
          echo "Syndication run: ${{ steps.posse.outputs.syndication_happened }}"
          echo "Files updated: ${{ steps.check.outputs.has_updates }}"
          echo "Next: PR should auto-merge with syndication included"
